<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simulated SQL Result JSON</title>
    <style>
      :root {
        --bg: #f6f7f4;
        --ink: #1d2730;
        --muted: #687789;
        --line: #d8ded6;
        --accent: #0f766e;
        --warn: #9a4d07;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex;
        flex-direction: column;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      header {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        background: #fbfcfa;
      }
      h1 { margin: 0; font-size: 16px; }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }
      button,
      a.button-like {
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        border-radius: 6px;
        padding: 7px 10px;
        font-weight: 800;
        cursor: pointer;
        text-decoration: none;
      }
      button.secondary,
      a.button-like.secondary {
        background: #fff;
        color: var(--accent);
      }
      .status {
        flex: 0 0 auto;
        min-height: 32px;
        padding: 8px 12px;
        color: var(--muted);
        font-size: 12px;
        border-bottom: 1px solid var(--line);
        background: #fbfcfa;
      }
      .warning { color: var(--warn); }
      textarea {
        flex: 1 1 auto;
        min-height: 0;
        width: 100%;
        resize: none;
        border: 0;
        outline: 0;
        padding: 14px;
        color: #22313d;
        background: #fff;
        font: 12px/1.5 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Simulated SQL Result JSON</h1>
      <div class="actions">
        <button id="save" type="button">Save for workflow</button>
        <button class="secondary" id="format" type="button">Format</button>
        <button class="secondary" id="reset" type="button">Reset initial content</button>
        <a class="button-like secondary" href="/mock/foundation">Back to workflow</a>
      </div>
    </header>
    <div class="status" id="status">Loading current simulated SQL packet...</div>
    <textarea id="editor" spellcheck="false"></textarea>
    <script>
      const storageKey = "foundationMock.savedDbScenario";
      const editorEl = document.querySelector("#editor");
      const statusEl = document.querySelector("#status");
      let sample = null;

      async function loadSample() {
        const response = await fetch("/api/mock/foundation-packet");
        if (!response.ok) throw new Error(response.statusText);
        sample = await response.json();
        const saved = window.localStorage.getItem(storageKey);
        editorEl.value = saved || JSON.stringify(sample, null, 2);
        statusEl.textContent = saved
          ? "Loaded the saved simulated packet from this browser."
          : "Loaded the initial simulated packet.";
      }

      function savePacket() {
        try {
          const parsed = JSON.parse(editorEl.value);
          const formatted = JSON.stringify(parsed, null, 2);
          editorEl.value = formatted;
          window.localStorage.setItem(storageKey, formatted);
          statusEl.textContent = "Saved. Return to the workflow page; it will load this packet on refresh.";
        } catch (error) {
          statusEl.innerHTML = `<span class="warning">${escapeHtml(error.message)}</span>`;
        }
      }

      function formatPacket() {
        try {
          editorEl.value = JSON.stringify(JSON.parse(editorEl.value), null, 2);
          statusEl.textContent = "Formatted JSON.";
        } catch (error) {
          statusEl.innerHTML = `<span class="warning">${escapeHtml(error.message)}</span>`;
        }
      }

      function resetPacket() {
        editorEl.value = JSON.stringify(sample, null, 2);
        window.localStorage.removeItem(storageKey);
        statusEl.textContent = "Reset to the initial simulated packet.";
      }

      function escapeHtml(value) {
        return String(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;");
      }

      document.querySelector("#save").addEventListener("click", savePacket);
      document.querySelector("#format").addEventListener("click", formatPacket);
      document.querySelector("#reset").addEventListener("click", resetPacket);
      loadSample().catch((error) => {
        statusEl.innerHTML = `<span class="warning">${escapeHtml(error.message)}</span>`;
      });
    </script>
  </body>
</html>
