<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Complete Assessment Workflow</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f4;
        --panel: #fff;
        --ink: #1d2730;
        --muted: #687789;
        --line: #d8ded6;
        --accent: #0f766e;
        --soft: #eef5f2;
        --warn: #9a4d07;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      header {
        min-height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 0 22px;
        border-bottom: 1px solid var(--line);
        background: #fbfcfa;
      }
      h1 { margin: 0; font-size: 19px; letter-spacing: 0; }
      main {
        display: grid;
        grid-template-columns: minmax(360px, 0.85fr) minmax(520px, 1.15fr);
        gap: 16px;
        padding: 16px;
        height: calc(100vh - 64px);
      }
      .stack { min-height: 0; display: flex; flex-direction: column; gap: 12px; }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
      }
      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
      }
      .panel-title { font-size: 13px; font-weight: 800; color: #25313d; }
      .panel-body { padding: 14px; overflow: auto; }
      textarea {
        width: 100%;
        min-height: 380px;
        resize: vertical;
        border: 0;
        outline: 0;
        padding: 14px;
        color: #22313d;
        font: 12px/1.5 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      }
      .config {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
      label { display: block; font-size: 12px; font-weight: 800; color: var(--muted); margin-bottom: 5px; }
      select, input {
        width: 100%;
        height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 9px;
        background: #fff;
        color: var(--ink);
        font: inherit;
      }
      .check {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 38px;
        margin-top: 17px;
        color: var(--muted);
        font-size: 13px;
      }
      .check input { width: 16px; height: 16px; }
      .actions { display: flex; gap: 8px; flex-wrap: wrap; }
      button {
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        border-radius: 6px;
        padding: 9px 12px;
        font-weight: 800;
        cursor: pointer;
      }
      button.secondary { background: #fff; color: var(--accent); }
      button:disabled { opacity: .58; cursor: wait; }
      .button-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin: 10px;
        border: 1px solid var(--accent);
        background: #fff;
        color: var(--accent);
        border-radius: 6px;
        padding: 8px 10px;
        font-weight: 800;
        text-decoration: none;
      }
      .status { color: var(--muted); font-size: 12px; }
      .metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }
      .metric {
        background: var(--soft);
        border: 1px solid #d4e4e0;
        border-radius: 8px;
        padding: 10px;
      }
      .metric span { display: block; color: var(--muted); font-size: 11px; font-weight: 800; margin-bottom: 4px; }
      .metric strong { display: block; font-size: 14px; overflow-wrap: anywhere; }
      .workflow { display: flex; flex-direction: column; gap: 10px; }
      details.step {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcfa;
        overflow: hidden;
      }
      details.step > summary {
        display: grid;
        grid-template-columns: 28px 1fr auto;
        gap: 10px;
        align-items: center;
        cursor: pointer;
        padding: 11px 12px;
      }
      .num {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        border-radius: 999px;
        background: #dcebe8;
        color: #0b5f59;
        font-size: 12px;
        font-weight: 800;
      }
      .step-name { font-size: 14px; font-weight: 800; }
      .step-explain { margin-top: 2px; color: var(--muted); font-size: 12px; font-weight: 500; }
      .tool {
        padding: 3px 8px;
        border-radius: 999px;
        background: #e8f1ee;
        color: #0b5f59;
        font-size: 12px;
        font-weight: 800;
      }
      .step-body { border-top: 1px solid var(--line); padding: 12px; }
      .triptych {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }
      details.preview {
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        overflow: hidden;
      }
      details.preview summary {
        cursor: pointer;
        padding: 8px 10px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }
      pre {
        margin: 0;
        padding: 10px;
        max-height: 320px;
        overflow: auto;
        border-top: 1px solid var(--line);
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        font: 12px/1.5 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      }
      .empty { padding: 16px; color: var(--muted); font-size: 14px; }
      .warning { color: var(--warn); }
      @media (max-width: 1050px) {
        main { grid-template-columns: 1fr; height: auto; }
        .config, .metrics, .triptych { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Complete GraphRAG Assessment Workflow</h1>
      <div class="status">Simulated PostgreSQL input, real Qdrant/BM25/Neo4j retrieval, real model calls</div>
    </header>
    <main>
      <section class="stack">
        <div class="panel">
          <div class="panel-header"><div class="panel-title">Configuration</div></div>
          <div class="panel-body">
            <div class="config">
              <div>
                <label for="provider">Provider</label>
                <select id="provider">
                  <option value="ollama">Internal Ollama</option>
                  <option value="openai">External OpenAI</option>
                </select>
              </div>
              <div>
                <label for="model">Model</label>
                <select id="model"></select>
              </div>
              <div>
                <label for="apiKey">OpenAI API key for this request only</label>
                <input id="apiKey" type="password" autocomplete="off" spellcheck="false" placeholder="sk-..." />
              </div>
              <label class="check">
                <input type="checkbox" id="confirmExternal" />
                Allow external OpenAI call
              </label>
            </div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">Simulated SQL Result JSON</div>
            <button class="secondary" id="reset">Reset</button>
          </div>
          <textarea id="packet"></textarea>
        </div>
        <div class="actions">
          <button id="run">Run Complete Workflow</button>
          <button class="secondary" id="cancel" disabled>Cancel Run</button>
          <button class="secondary" id="refreshRuns">Refresh Saved Runs</button>
        </div>
        <div class="status" id="status">Ready. No workflow has run yet.</div>
        <div class="metrics" id="metrics"></div>
      </section>
      <section class="stack">
        <div class="panel">
          <div class="panel-header"><div class="panel-title">Execution Workflow</div></div>
          <div class="panel-body"><div class="workflow" id="workflow"><div class="empty">No run yet.</div></div></div>
        </div>
        <div class="panel">
          <div class="panel-header"><div class="panel-title">Final Result Contract</div></div>
          <div class="panel-body"><pre id="finalResult"></pre></div>
        </div>
        <div class="panel">
          <div class="panel-header"><div class="panel-title">Saved Comparison Runs</div></div>
          <div class="panel-body"><pre id="runs"></pre></div>
        </div>
      </section>
    </main>
    <script>
      const models = {
        ollama: ["qwen3:14b", "gemma3:4b"],
        openai: ["gpt-5.4-mini", "gpt-5.4", "gpt-5.5", "gpt-4.1-mini"],
      };
      const providerEl = document.querySelector("#provider");
      const modelEl = document.querySelector("#model");
      const keyEl = document.querySelector("#apiKey");
      const confirmEl = document.querySelector("#confirmExternal");
      const packetEl = document.querySelector("#packet");
      const workflowEl = document.querySelector("#workflow");
      const finalEl = document.querySelector("#finalResult");
      const runsEl = document.querySelector("#runs");
      const metricsEl = document.querySelector("#metrics");
      const statusEl = document.querySelector("#status");
      let sample = null;
      let currentJobId = null;
      let pollTimer = null;
      let lastPreflight = null;

      function configureModels() {
        modelEl.innerHTML = models[providerEl.value].map((model) => `<option value="${model}">${model}</option>`).join("");
      }

      async function loadSample() {
        sample = await getJson("/api/mock/foundation-packet");
        packetEl.value = JSON.stringify(sample, null, 2);
        clearOutput();
      }

      async function getJson(url) {
        const response = await fetch(url);
        const data = await response.json();
        if (!response.ok) throw new Error(data.detail || response.statusText);
        return data;
      }

      async function postJson(url, body) {
        const response = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.detail || response.statusText);
        return data;
      }

      function requestBody() {
        const model = {
          provider: providerEl.value,
          model: modelEl.value,
          confirm_external_call: confirmEl.checked,
          estimated_output_tokens: 1200,
          max_estimated_input_tokens: 24000,
        };
        if (providerEl.value === "openai" && keyEl.value.trim()) model.openai_api_key = keyEl.value.trim();
        return {
          input_source: {
            adapter: "foundation_packet_v1",
            payload: JSON.parse(packetEl.value),
          },
          model,
          top_k: 8,
          debug: true,
        };
      }

      async function runWorkflow() {
        try {
          setBusy(true, "Checking workflow size before model calls...");
          const body = requestBody();
          const preflight = await postJson("/api/workflows/complete-assessment/preflight", body);
          renderPreflight(preflight);
          if (preflight.will_exceed_guard) {
            throw new Error(`Preflight blocked: estimated input tokens ${preflight.estimated_input_tokens} exceed guard ${preflight.max_estimated_input_tokens}`);
          }
          statusEl.textContent = "Starting background workflow job...";
          const job = await postJson("/api/workflows/complete-assessment/jobs", body);
          currentJobId = job.job_id;
          setBusy(true);
          renderJob(job);
          startPolling();
        } catch (error) {
          statusEl.innerHTML = `<span class="warning">${escapeHtml(error.message)}</span>`;
          currentJobId = null;
          stopPolling();
          setBusy(false);
        }
      }

      async function cancelWorkflow() {
        if (!currentJobId) return;
        try {
          statusEl.textContent = `Cancelling ${currentJobId} and asking Ollama to unload the model...`;
          const job = await postJson(`/api/workflows/complete-assessment/jobs/${currentJobId}/cancel`, {});
          renderJob(job);
          if (job.status === "cancelling") {
            setBusy(true);
            startPolling();
          } else {
            stopPolling();
            setBusy(false);
          }
        } catch (error) {
          statusEl.innerHTML = `<span class="warning">${escapeHtml(error.message)}</span>`;
          setBusy(false);
        }
      }

      function startPolling() {
        stopPolling();
        pollTimer = window.setInterval(pollJob, 2000);
        pollJob();
      }

      function stopPolling() {
        if (pollTimer) window.clearInterval(pollTimer);
        pollTimer = null;
      }

      async function pollJob() {
        if (!currentJobId) return;
        try {
          const job = await getJson(`/api/workflows/complete-assessment/jobs/${currentJobId}`);
          renderJob(job);
          if (["completed", "failed", "cancelled"].includes(job.status)) {
            stopPolling();
            setBusy(false);
            if (job.status === "completed" && job.result) {
              renderRun(job.result);
              await refreshRuns();
              statusEl.textContent = `Completed ${job.result.run_id}`;
            } else if (job.status === "cancelled") {
              statusEl.textContent = `Cancelled ${job.job_id}`;
            } else {
              statusEl.innerHTML = `<span class="warning">${escapeHtml(job.error || "Workflow failed")}</span>`;
            }
          }
        } catch (error) {
          statusEl.innerHTML = `<span class="warning">${escapeHtml(error.message)}</span>`;
          stopPolling();
          setBusy(false);
        }
      }

      function renderRun(data) {
        metricsEl.innerHTML = [
          metric("Run", data.run_id),
          metric("Provider", data.provider),
          metric("Model", data.model),
          metric("Est. price", `$${data.cost_estimate?.estimated_cost_usd ?? 0}`),
        ].join("");
        workflowEl.innerHTML = data.steps.map((step, index) => renderStep(step, index)).join("");
        finalEl.textContent = JSON.stringify(data.final_result, null, 2);
      }

      function renderPreflight(data) {
        lastPreflight = data;
        metricsEl.innerHTML = [
          metric("Preflight", data.will_exceed_guard ? "Blocked" : "OK"),
          metric("Input tokens", data.estimated_input_tokens),
          metric("LLM calls", data.llm_call_count),
          metric("Est. price", `$${data.estimated_cost_usd ?? 0}`),
        ].join("");
        workflowEl.innerHTML = renderPreflightStep(data);
      }

      function renderPreflightStep(data) {
        return `<details class="step" open>
          <summary>
            <span class="num">0</span>
            <span>
              <span class="step-name">Preflight estimate</span>
              <span class="step-explain">Checks expected workflow size before GPU/API model calls.</span>
            </span>
            <span class="tool">Python deterministic workflow</span>
          </summary>
          <div class="step-body">${preview("Output", data)}</div>
        </details>`;
      }

      function renderJob(job) {
        statusEl.textContent = `Job ${job.job_id}: ${job.status}`;
        metricsEl.innerHTML = [
          metric("Job", job.job_id),
          metric("Status", job.status),
          metric("Provider", job.provider),
          metric("Model", job.model),
        ].join("");
        if (job.status !== "completed") {
          workflowEl.innerHTML = `${lastPreflight ? renderPreflightStep(lastPreflight) : ""}${renderJobStep(job)}`;
        }
      }

      function renderJobStep(job) {
        return `<details class="step" open>
            <summary>
              <span class="num">1</span>
              <span>
                <span class="step-name">Background workflow job</span>
                <span class="step-explain">The browser polls this job instead of waiting on a long request.</span>
              </span>
              <span class="tool">${escapeHtml(job.status)}</span>
            </summary>
            <div class="step-body">${preview("Job", job)}</div>
          </details>`;
      }


      function renderStep(step, index) {
        return `<details class="step"${index === 0 ? " open" : ""}>
          <summary>
            <span class="num">${index + 1}</span>
            <span>
              <span class="step-name">${escapeHtml(step.name)}</span>
              <span class="step-explain">${escapeHtml(step.explanation)}</span>
            </span>
            <span class="tool">${escapeHtml(step.tool)}</span>
          </summary>
          <div class="step-body">
            <div class="triptych">
              ${preview("Input", step.input)}
              ${preview("Process", step.process)}
              ${preview("Output", step.output)}
            </div>
          </div>
        </details>`;
      }

      function preview(title, value) {
        const text = typeof value === "string" ? value : JSON.stringify(value, null, 2);
        if (text.length > 9000) {
          const blob = new Blob([text], { type: "text/plain" });
          const url = URL.createObjectURL(blob);
          return `<details class="preview"><summary>${escapeHtml(title)}</summary><a class="button-link" href="${url}" target="_blank" rel="noreferrer">Open full preview</a><pre>Large output (${text.length} chars)</pre></details>`;
        }
        return `<details class="preview" open><summary>${escapeHtml(title)}</summary><pre>${escapeHtml(text)}</pre></details>`;
      }

      function metric(label, value) {
        return `<div class="metric"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></div>`;
      }

      function clearOutput() {
        workflowEl.innerHTML = `<div class="empty">No run yet.</div>`;
        finalEl.textContent = "";
        metricsEl.innerHTML = "";
        statusEl.textContent = "Ready. No workflow has run yet.";
      }

      async function refreshRuns() {
        const runs = await getJson("/api/workflows/complete-assessment/runs");
        runsEl.textContent = JSON.stringify(runs, null, 2);
      }

      function setBusy(busy, text) {
        document.querySelectorAll("button, select, input").forEach((item) => {
          item.disabled = busy;
        });
        document.querySelector("#cancel").disabled = !busy || !currentJobId;
        document.querySelector("#run").disabled = busy;
        document.querySelector("#refreshRuns").disabled = busy;
        if (text) statusEl.textContent = text;
      }

      function escapeHtml(value) {
        return String(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;");
      }

      providerEl.addEventListener("change", configureModels);
      document.querySelector("#run").addEventListener("click", runWorkflow);
      document.querySelector("#cancel").addEventListener("click", cancelWorkflow);
      document.querySelector("#reset").addEventListener("click", () => {
        packetEl.value = JSON.stringify(sample, null, 2);
        clearOutput();
      });
      document.querySelector("#refreshRuns").addEventListener("click", refreshRuns);
      configureModels();
      loadSample().then(refreshRuns);
    </script>
  </body>
</html>
