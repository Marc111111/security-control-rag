<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Foundation Summary Mock</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f6f3;
        --panel: #ffffff;
        --ink: #1d2730;
        --muted: #697789;
        --line: #d8ded6;
        --accent: #0f766e;
        --accent-strong: #0b5f59;
        --warn: #a8550d;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: var(--bg);
        color: var(--ink);
      }
      header {
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        border-bottom: 1px solid var(--line);
        background: #fbfcfa;
      }
      h1 {
        margin: 0;
        font-size: 19px;
        font-weight: 700;
        letter-spacing: 0;
      }
      main {
        display: grid;
        grid-template-columns: minmax(360px, 0.9fr) minmax(480px, 1.1fr);
        gap: 16px;
        padding: 16px;
        height: calc(100vh - 64px);
      }
      section {
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
      }
      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
      }
      .panel-title {
        font-size: 13px;
        font-weight: 700;
        color: #24313b;
      }
      .panel-body {
        padding: 14px;
        overflow: auto;
      }
      textarea {
        width: 100%;
        min-height: 100%;
        resize: none;
        border: 0;
        outline: 0;
        padding: 14px;
        font: 12px/1.5 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        color: #22313d;
      }
      .input-panel {
        flex: 1;
        min-height: 0;
      }
      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }
      .controls {
        display: grid;
        grid-template-columns: minmax(180px, 260px) minmax(240px, 1fr) auto;
        gap: 10px;
        align-items: end;
      }
      .control label {
        display: block;
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
        margin-bottom: 5px;
      }
      select,
      input[type="password"] {
        width: 100%;
        height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: white;
        color: var(--ink);
        padding: 0 9px;
        font: inherit;
      }
      .check {
        min-height: 38px;
        display: inline-flex;
        gap: 8px;
        align-items: center;
        font-size: 13px;
        color: var(--muted);
      }
      .check input {
        width: 16px;
        height: 16px;
      }
      button {
        border: 1px solid var(--accent);
        background: var(--accent);
        color: white;
        border-radius: 6px;
        padding: 9px 12px;
        font-weight: 700;
        cursor: pointer;
      }
      button.secondary {
        background: white;
        color: var(--accent-strong);
      }
      button:disabled {
        opacity: 0.55;
        cursor: wait;
      }
      .status {
        font-size: 12px;
        color: var(--muted);
      }
      .price {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }
      .metric {
        background: #eef4f2;
        border: 1px solid #d4e4e0;
        border-radius: 8px;
        padding: 10px;
      }
      .metric span {
        display: block;
        font-size: 11px;
        font-weight: 700;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .metric strong {
        display: block;
        font-size: 14px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
      .workflow {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .workflow-step {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcfa;
        overflow: hidden;
      }
      .workflow-step > summary {
        display: flex;
        gap: 10px;
        align-items: center;
        cursor: pointer;
        padding: 10px 12px;
        font-weight: 700;
        font-size: 13px;
      }
      .step-index {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        border-radius: 999px;
        background: #dfece9;
        color: #0b5f59;
        font-size: 12px;
      }
      .step-content {
        border-top: 1px solid var(--line);
        padding: 10px 12px 12px;
      }
      .step-tabs {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
      .step-tab {
        border: 1px solid var(--line);
        border-radius: 6px;
        background: white;
      }
      .step-tab summary {
        cursor: pointer;
        padding: 8px 10px;
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
      }
      .step-tab pre {
        border-top: 1px solid var(--line);
        padding: 10px;
        max-height: 280px;
        overflow: auto;
      }
      .empty {
        color: var(--muted);
        font-size: 14px;
        padding: 14px;
      }
      .field {
        padding: 12px;
        border-bottom: 1px solid var(--line);
      }
      .field:last-child {
        border-bottom: 0;
      }
      .label {
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .value {
        font-size: 14px;
        line-height: 1.45;
      }
      ul {
        margin: 0;
        padding-left: 18px;
      }
      li {
        margin: 4px 0;
      }
      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font: 12px/1.5 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 12px;
        font-weight: 700;
        background: #e8f3f1;
        color: #0b5f59;
      }
      .warning {
        color: var(--warn);
      }
      @media (max-width: 980px) {
        main {
          height: auto;
          grid-template-columns: 1fr;
        }
        .grid,
        .step-tabs {
          grid-template-columns: 1fr;
        }
        .input-panel {
          min-height: 520px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Foundation Assessment Summary Mock</h1>
      <span class="pill">Simulated PostgreSQL</span>
    </header>
    <main>
      <section>
        <div class="panel input-panel">
          <div class="panel-header">
            <div class="panel-title">Source PostgreSQL Assessment Packet</div>
            <button class="secondary" id="reset">Reset</button>
          </div>
          <textarea id="packet"></textarea>
        </div>
        <div class="actions">
          <button id="runMock">Run Simulation</button>
          <button class="secondary" id="estimate">Estimate Selected Model</button>
          <button class="secondary" id="runSelected">Run Selected Model</button>
        </div>
        <div class="controls">
          <div class="control">
            <label for="modelSelect">Model</label>
            <select id="modelSelect">
              <option value="qwen3:14b" data-provider="ollama">qwen3:14b local</option>
              <option value="gemma3:4b" data-provider="ollama">gemma3:4b local</option>
              <option value="gpt-5.4-mini" data-provider="openai">gpt-5.4-mini OpenAI</option>
              <option value="gpt-5-mini" data-provider="openai">gpt-5-mini OpenAI</option>
              <option value="gpt-4.1-mini" data-provider="openai">gpt-4.1-mini OpenAI</option>
              <option value="gpt-5" data-provider="openai">gpt-5 OpenAI</option>
              <option value="gpt-5.5" data-provider="openai">gpt-5.5 OpenAI</option>
            </select>
          </div>
          <div class="control">
            <label for="apiKey">OpenAI API key for this request only</label>
            <input
              id="apiKey"
              type="password"
              autocomplete="off"
              spellcheck="false"
              placeholder="sk-..."
            />
          </div>
          <label class="check">
            <input type="checkbox" id="allowExternal" />
            Allow external OpenAI call for selected model
          </label>
        </div>
        <div class="status" id="status">Ready.</div>
        <div class="price" id="price"></div>
      </section>
      <section>
        <div class="panel">
          <div class="panel-header"><div class="panel-title">Execution Workflow</div></div>
          <div class="panel-body"><div class="workflow" id="workflow"></div></div>
        </div>
        <div class="grid">
          <div class="panel">
            <div class="panel-header"><div class="panel-title">Draft Report Fields</div></div>
            <div class="panel-body" id="draft"></div>
          </div>
          <div class="panel">
            <div class="panel-header"><div class="panel-title">Findings</div></div>
            <div class="panel-body" id="findings"></div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header"><div class="panel-title">Target PostgreSQL Payload</div></div>
          <div class="panel-body"><pre id="postgres"></pre></div>
        </div>
        <div class="panel">
          <div class="panel-header"><div class="panel-title">API / Token Debug</div></div>
          <div class="panel-body"><pre id="debug"></pre></div>
        </div>
      </section>
    </main>
    <script>
      const packetEl = document.querySelector("#packet");
      const statusEl = document.querySelector("#status");
      const draftEl = document.querySelector("#draft");
      const findingsEl = document.querySelector("#findings");
      const postgresEl = document.querySelector("#postgres");
      const debugEl = document.querySelector("#debug");
      const workflowEl = document.querySelector("#workflow");
      const modelSelect = document.querySelector("#modelSelect");
      const allowExternal = document.querySelector("#allowExternal");
      const apiKeyEl = document.querySelector("#apiKey");
      const priceEl = document.querySelector("#price");
      let samplePacket = null;

      async function loadSample() {
        const response = await fetch("/api/mock/foundation-packet");
        samplePacket = await response.json();
        packetEl.value = JSON.stringify(samplePacket, null, 2);
      }

      function packetPayload() {
        return { packet: JSON.parse(packetEl.value), debug: true };
      }

      function selectedModel() {
        const option = modelSelect.options[modelSelect.selectedIndex];
        return { model: option.value, provider: option.dataset.provider };
      }

      function modelPayload() {
        const selected = selectedModel();
        const payload = {
          ...packetPayload(),
          model: selected.model,
          provider: selected.provider,
          estimated_output_tokens: 900,
          confirm_external_call: allowExternal.checked,
        };
        if (selected.provider === "openai" && apiKeyEl.value.trim()) {
          payload.openai_api_key = apiKeyEl.value.trim();
        }
        return payload;
      }

      async function postJson(url, body) {
        const response = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.detail || response.statusText);
        return data;
      }

      function setBusy(isBusy, text) {
        document.querySelectorAll("button").forEach((button) => (button.disabled = isBusy));
        statusEl.textContent = text;
      }

      function renderResponse(data) {
        const draft = data.draft || {};
        draftEl.innerHTML = [
          field("Management Summary", draft.management_summary),
          field("Introduction", draft.introduction),
          field("Objective", draft.objective),
          field("Risk Exposure", draft.risk_exposure),
          field("Conclusion", draft.conclusion),
          listField("Key Findings", draft.key_findings),
          listField("Strengths", draft.strengths),
          listField("Weaknesses", draft.weaknesses),
          listField("Missing Information", draft.missing_information),
        ].join("");
        findingsEl.innerHTML = Object.entries(data.findings || {})
          .map(([name, items]) => listField(name, items.map((item) => item.summary)))
          .join("");
        postgresEl.textContent = JSON.stringify(data.postgres_payload || {}, null, 2);
        const estimate = data.model_run?.token_estimate || data.token_estimate;
        if (estimate) renderPrice(data.model_run || { provider: "estimate", model: estimate.model, token_estimate: estimate });
        debugEl.textContent = JSON.stringify(
          {
            model_run: data.model_run,
            debug: data.debug,
          },
          null,
          2,
        );
        renderWorkflow(data);
      }

      function renderEmpty() {
        draftEl.innerHTML = `<div class="empty">No generated draft yet.</div>`;
        findingsEl.innerHTML = `<div class="empty">No findings yet.</div>`;
        postgresEl.textContent = "";
        debugEl.textContent = "";
        priceEl.innerHTML = "";
        workflowEl.innerHTML = `<div class="empty">No run yet. Choose a model and run the workflow to see each step.</div>`;
        statusEl.textContent = "Ready. No workflow has run yet.";
      }

      function renderWorkflow(data) {
        const selected = data.model_run || {
          provider: "mock",
          model: "simulated foundation model",
          token_estimate: null,
        };
        const debug = data.debug || {};
        const packet = safeJsonParse(packetEl.value);
        const steps = [
          {
            title: "Read assessment rows from PostgreSQL",
            input: {
              query:
                "SELECT vendor, tier_attributes, questionnaire_results, controls, comments, evidence_descriptions\n" +
                "FROM tprm_assessment_view\n" +
                `WHERE assessment_id = '${escapeSql(packet?.assessment_id || "A-100")}';`,
            },
            output: packet,
          },
          {
            title: "Build canonical assessment packet",
            input: "Application joins vendor, tier, control, response, comment, and evidence rows.",
            output: packet,
          },
          {
            title: "Sanitize human-generated text",
            input: {
              vendor_comments: (packet?.questionnaire_results || []).map((item) => ({
                question_id: item.question_id,
                vendor_comment: item.vendor_comment,
                analyst_comment: item.analyst_comment,
              })),
            },
            output: debug.sanitized_packet || "Available when debug=true on the workflow response.",
          },
          {
            title: "Classify findings",
            input: "Full compliance becomes strength. Partial/no compliance becomes weakness.",
            output: data.findings || {},
          },
          {
            title: "Estimate token usage and request price",
            input: {
              provider: selected.provider,
              model: selected.model,
              estimated_output_tokens: selected.token_estimate?.estimated_output_tokens || 900,
            },
            output: selected.token_estimate || "No estimate returned for this run.",
          },
          {
            title: "Call foundation model: prompt input and raw output",
            input: {
              provider: selected.provider,
              model: selected.model,
              messages_sent_to_model: debug.prompt_messages || "Prompt messages not returned.",
              api_key: selected.provider === "openai" ? "[request scoped key hidden]" : "[not used]",
            },
            output: {
              raw_model_response: debug.raw_model_response || "Raw model output not returned.",
            },
          },
          {
            title: "Parse model output into report fields",
            input: debug.raw_model_response || "Raw model output not returned.",
            output: data.draft || {},
          },
          {
            title: "Prepare PostgreSQL draft write payload",
            input:
              "INSERT or UPDATE draft assessment section fields. snapshot_ready remains false until analyst approval.",
            output: data.postgres_payload || {},
          },
        ];
        workflowEl.innerHTML = steps.map((step, index) => workflowStep(step, index)).join("");
      }

      function workflowStep(step, index) {
        const open = index < 2 ? " open" : "";
        return `<details class="workflow-step"${open}>
          <summary><span class="step-index">${index + 1}</span>${escapeHtml(step.title)}</summary>
          <div class="step-content">
            <div class="step-tabs">
              ${stepTab("Input", step.input, index === 0)}
              ${stepTab("Output / Result", step.output, index === 0)}
            </div>
          </div>
        </details>`;
      }

      function stepTab(label, value, open) {
        return `<details class="step-tab"${open ? " open" : ""}>
          <summary>${escapeHtml(label)}</summary>
          <pre>${escapeHtml(formatValue(value))}</pre>
        </details>`;
      }

      function formatValue(value) {
        if (typeof value === "string") return value;
        return JSON.stringify(value, null, 2);
      }

      function safeJsonParse(value) {
        try {
          return JSON.parse(value);
        } catch {
          return null;
        }
      }

      function escapeSql(value) {
        return String(value).replaceAll("'", "''");
      }

      function renderPrice(modelRun) {
        const estimate = modelRun.token_estimate || {};
        priceEl.innerHTML = [
          metric("Provider", modelRun.provider || "n/a"),
          metric("Model", modelRun.model || estimate.model || "n/a"),
          metric("Estimated tokens", estimate.estimated_total_tokens ?? "n/a"),
          metric("Estimated price", `$${estimate.estimated_cost_usd ?? "0.000000"}`),
        ].join("");
      }

      function metric(label, value) {
        return `<div class="metric"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></div>`;
      }

      function field(label, value) {
        return `<div class="field"><div class="label">${escapeHtml(label)}</div><div class="value">${escapeHtml(value || "")}</div></div>`;
      }

      function listField(label, items = []) {
        const values = items.length ? items : ["None"];
        return `<div class="field"><div class="label">${escapeHtml(label)}</div><ul>${values
          .map((item) => `<li>${escapeHtml(item)}</li>`)
          .join("")}</ul></div>`;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      document.querySelector("#reset").addEventListener("click", () => {
        packetEl.value = JSON.stringify(samplePacket, null, 2);
        renderEmpty();
      });

      document.querySelector("#runMock").addEventListener("click", async () => {
        try {
          setBusy(true, "Running simulated workflow...");
          const data = await postJson("/api/assessments/foundation-summary/model-run", {
            ...modelPayload(),
            provider: "mock",
          });
          renderResponse(data);
          statusEl.textContent = "Simulation complete. No external model or database was used.";
        } catch (error) {
          statusEl.innerHTML = `<span class="warning">${escapeHtml(error.message)}</span>`;
        } finally {
          setBusy(false, statusEl.textContent);
        }
      });

      document.querySelector("#estimate").addEventListener("click", async () => {
        try {
          setBusy(true, "Estimating token usage...");
          const data = await postJson("/api/assessments/foundation-summary/token-estimate", {
            ...packetPayload(),
            model: selectedModel().model,
          });
          debugEl.textContent = JSON.stringify(data, null, 2);
          renderPrice({ provider: selectedModel().provider, model: selectedModel().model, token_estimate: data });
          statusEl.textContent = `Estimated cost: $${data.estimated_cost_usd}`;
        } catch (error) {
          statusEl.innerHTML = `<span class="warning">${escapeHtml(error.message)}</span>`;
        } finally {
          setBusy(false, statusEl.textContent);
        }
      });

      document.querySelector("#runSelected").addEventListener("click", async () => {
        try {
          const selected = selectedModel();
          setBusy(true, `Running ${selected.model}...`);
          const data = await postJson(
            "/api/assessments/foundation-summary/model-run",
            modelPayload(),
          );
          renderResponse(data);
          statusEl.textContent = `${selected.model} run complete. Estimated price: $${data.model_run.token_estimate.estimated_cost_usd}`;
        } catch (error) {
          statusEl.innerHTML = `<span class="warning">${escapeHtml(error.message)}</span>`;
        } finally {
          setBusy(false, statusEl.textContent);
        }
      });

      modelSelect.addEventListener("change", () => {
        document.querySelector("#estimate").click();
      });

      loadSample().then(renderEmpty);
    </script>
  </body>
</html>
