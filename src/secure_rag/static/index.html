<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Security Control RAG</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f2;
        --panel: #ffffff;
        --ink: #1f2933;
        --muted: #667085;
        --line: #d8ded5;
        --accent: #0f766e;
        --accent-strong: #115e59;
        --warn: #9a3412;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      .app {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        min-height: 100vh;
      }

      aside {
        border-right: 1px solid var(--line);
        padding: 20px;
        background: #eef2ea;
      }

      h1 {
        margin: 0 0 18px;
        font-size: 22px;
        line-height: 1.2;
      }

      .status {
        display: grid;
        gap: 10px;
        font-size: 13px;
        color: var(--muted);
      }

      .status strong {
        display: block;
        color: var(--ink);
        font-size: 12px;
        margin-bottom: 2px;
      }

      main {
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-height: 100vh;
      }

      header {
        border-bottom: 1px solid var(--line);
        padding: 16px 24px;
        background: rgba(255, 255, 255, 0.76);
      }

      header h2 {
        margin: 0;
        font-size: 18px;
      }

      .messages {
        padding: 24px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .message {
        max-width: 900px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px 16px;
        background: var(--panel);
        line-height: 1.5;
        white-space: pre-wrap;
      }

      .user {
        align-self: flex-end;
        background: #e3f5f2;
        border-color: #a7d8d0;
      }

      .assistant {
        align-self: flex-start;
      }

      .sources {
        margin-top: 12px;
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 12px;
      }

      .warning {
        color: var(--warn);
        font-weight: 600;
      }

      form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        padding: 16px 24px 22px;
        border-top: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.82);
      }

      textarea {
        resize: none;
        min-height: 52px;
        max-height: 160px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
        font: inherit;
        color: var(--ink);
        background: #fff;
      }

      button {
        min-width: 112px;
        border: 0;
        border-radius: 8px;
        padding: 0 18px;
        font: inherit;
        font-weight: 700;
        background: var(--accent);
        color: white;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-strong);
      }

      button:disabled {
        opacity: 0.55;
        cursor: wait;
      }

      code {
        font-family: "Cascadia Code", Consolas, monospace;
        font-size: 12px;
      }

      @media (max-width: 780px) {
        .app {
          grid-template-columns: 1fr;
        }

        aside {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        form {
          grid-template-columns: 1fr;
        }

        button {
          min-height: 44px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside>
        <h1>Security Control RAG</h1>
        <div class="status">
          <div><strong>Mode</strong><span id="mode">loading</span></div>
          <div><strong>Vector DB</strong><code id="db">loading</code></div>
          <div><strong>Generator</strong><code id="generation">loading</code></div>
          <div><strong>Embeddings</strong><code id="embedding">loading</code></div>
        </div>
      </aside>
      <main>
        <header>
          <h2>Ask for controls, measures, risks, vulnerabilities, tiers, or framework mappings</h2>
        </header>
        <section class="messages" id="messages"></section>
        <form id="form">
          <textarea
            id="message"
            autocomplete="off"
            placeholder="Example: tier 2 ransomware controls for backup and recovery"
          ></textarea>
          <button id="send" type="submit">Send</button>
        </form>
      </main>
    </div>

    <script>
      const messages = document.querySelector("#messages");
      const form = document.querySelector("#form");
      const message = document.querySelector("#message");
      const send = document.querySelector("#send");
      const history = [];

      function addMessage(role, text, sources = [], insufficient = false) {
        const item = document.createElement("article");
        item.className = `message ${role}`;
        item.textContent = text;
        if (insufficient) {
          const warning = document.createElement("div");
          warning.className = "warning";
          warning.textContent = "Insufficient corpus evidence";
          item.prepend(warning);
        }
        if (sources.length) {
          const list = document.createElement("div");
          list.className = "sources";
          sources.forEach((source, index) => {
            const line = document.createElement("div");
            line.textContent = `[S${index + 1}] ${source.source_path || source.file_name || "source"} (${source.score})`;
            list.appendChild(line);
          });
          item.appendChild(list);
        }
        messages.appendChild(item);
        messages.scrollTop = messages.scrollHeight;
      }

      async function loadHealth() {
        const response = await fetch("/api/health");
        const health = await response.json();
        document.querySelector("#mode").textContent = health.mode;
        document.querySelector("#db").textContent = health.db_path;
        document.querySelector("#generation").textContent = health.generation_model;
        document.querySelector("#embedding").textContent = health.embedding_model;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const text = message.value.trim();
        if (!text) return;
        addMessage("user", text);
        history.push({ role: "user", content: text });
        message.value = "";
        send.disabled = true;
        try {
          const response = await fetch("/api/query", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text, history: history.slice(0, -1) }),
          });
          const raw = await response.text();
          let data;
          try {
            data = JSON.parse(raw);
          } catch {
            throw new Error(raw || "Request failed");
          }
          if (!response.ok) throw new Error(data.detail || "Request failed");
          addMessage("assistant", data.answer, data.sources, data.insufficient_evidence);
          history.push({ role: "assistant", content: data.answer });
        } catch (error) {
          addMessage("assistant", `Request failed: ${error.message}`, [], true);
        } finally {
          send.disabled = false;
          message.focus();
        }
      });

      loadHealth().catch((error) => {
        document.querySelector("#mode").textContent = `offline: ${error.message}`;
      });
    </script>
  </body>
</html>
