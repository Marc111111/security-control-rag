services:
  qdrant:
    image: qdrant/qdrant:v1.18.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./third_party/qdrant/storage:/qdrant/storage

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/please-change-me
    volumes:
      - ./third_party/neo4j/data:/data
      - ./third_party/neo4j/logs:/logs
